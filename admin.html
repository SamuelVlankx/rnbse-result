<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 9px 12px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      color: white;
      background: #007bff;
    }

    .delete { background: #dc3545; }
    .save { background: #28a745; }

    table {
      width: 100%;
      margin-top: 25px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    #adminPanel {
      display: none;
    }
  </style>
</head>

<body>

<div id="loginBox" class="card">
  <h2>Admin Login</h2>
  <input id="adminPassword" type="password" placeholder="Enter Admin Password">
  <br>
  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<div id="adminPanel">
  <div class="card">
    <h2>Admin Panel</h2>

  <label><b>Exam Type</b></label><br>

<select id="examType" onchange="toggleExamType()">
  <option value="HSLC">HSLC</option>
  <option value="HSSLC">HSSLC</option>
</select>

<br><br>

    <input id="certificateNo" placeholder="Certificate Number (e.g. MBSE2026-0001)">
    <input id="roll" placeholder="Roll Number">
    <input id="regNo" placeholder="Registration Number">
    <input id="name" placeholder="Student Name">
    <input id="resultDate" placeholder="Result Date (Example: 15 June 2026)">
    <input id="photo" type="file" accept="image/*">
    <div id="hslcSubjects">

    <input id="english" placeholder="English">
    <input id="mizo" placeholder="Mizo">
    <input id="mathematics" placeholder="Mathematics">
    <input id="science" placeholder="Science">
    <input id="socialScience" placeholder="Social Science">

    </div>

    <div id="hsslcSubjects" style="display:none;">

      <label><b>Stream</b></label><br>

<select id="stream">
  <option value="">Select Stream</option>
  <option value="Arts">Arts</option>
  <option value="Commerce">Commerce</option>
  <option value="Science">Science</option>
</select>

<br><br>

<h3>HSSLC Subjects</h3>

<input id="subject1" placeholder="Subject 1 Name">
<input id="mark1" placeholder="Marks">

<input id="subject2" placeholder="Subject 2 Name">
<input id="mark2" placeholder="Marks">

<input id="subject3" placeholder="Subject 3 Name">
<input id="mark3" placeholder="Marks">

<input id="subject4" placeholder="Subject 4 Name">
<input id="mark4" placeholder="Marks">

<input id="subject5" placeholder="Subject 5 Name">
<input id="mark5" placeholder="Marks">

<input id="subject6" placeholder="Subject 6 Name">
<input id="mark6" placeholder="Marks">

</div>
    
    <br>
    <button class="save" onclick="addStudent()">Add Student</button>
    <button onclick="updateStudent()">Update Student</button>

    <p id="message"></p>
  </div>

  <table>
    <thead>
      <tr>
        <th>Certificate No</th>
        <th>Roll</th>
        <th>Reg No</th>
        <th>Name</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<script>
const ADMIN_PASSWORD = "admin123";

function login() {
  const password = document.getElementById("adminPassword").value;

  if (password === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadStudents();
  } else {
    document.getElementById("loginMessage").innerText = "Wrong password";
  }
}

function getFormData() {

    const examType = document.getElementById("examType").value;

    let student = {
        examType,
        certificateNo: document.getElementById("certificateNo").value,
        roll: document.getElementById("roll").value,
        regNo: document.getElementById("regNo").value,
        name: document.getElementById("name").value,
        photo: document.getElementById("photo").value,
        resultDate: document.getElementById("resultDate").value
    };

    if (examType === "HSLC") {

        student.marks = {
            english: Number(document.getElementById("english").value),
            mizo: Number(document.getElementById("mizo").value),
            mathematics: Number(document.getElementById("mathematics").value),
            science: Number(document.getElementById("science").value),
            socialScience: Number(document.getElementById("socialScience").value)
        };

    } else {

        student.subjects = [

            {
                name: document.getElementById("subject1").value,
                marks: Number(document.getElementById("mark1").value)
            },

            {
                name: document.getElementById("subject2").value,
                marks: Number(document.getElementById("mark2").value)
            },

            {
                name: document.getElementById("subject3").value,
                marks: Number(document.getElementById("mark3").value)
            },

            {
                name: document.getElementById("subject4").value,
                marks: Number(document.getElementById("mark4").value)
            },

            {
                name: document.getElementById("subject5").value,
                marks: Number(document.getElementById("mark5").value)
            },

            {
                name: document.getElementById("subject6").value,
                marks: Number(document.getElementById("mark6").value)
            }

        ];

    }

    return student;
}

async function addStudent() {

  const file = document.getElementById("photo").files[0];

  let photoUrl = "";

  if (file) {

    const formData = new FormData();

    formData.append("photo", file);

    const upload = await fetch("/upload-photo", {
      method: "POST",
      body: formData
    });

    const uploaded = await upload.json();

    photoUrl = uploaded.photo;

  }

  const student = getFormData();

  student.photo = photoUrl;

  const res = await fetch("/add-student", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(student)
  });

  const data = await res.json();

  document.getElementById("message").innerText = data.message;

  loadStudents();

}

async function updateStudent() {
  const student = getFormData();

  const res = await fetch("/update-student/" + student.roll, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(student)
  });

  const data = await res.json();
  document.getElementById("message").innerText = data.message;
  loadStudents();
}

async function deleteStudent(roll) {
  if (!confirm("Delete roll number " + roll + "?")) return;

  const res = await fetch("/delete-student/" + roll, {
    method: "DELETE"
  });

  const data = await res.json();
  document.getElementById("message").innerText = data.message;
  loadStudents();
}

async function loadStudents() {
  const res = await fetch("/students");
  const students = await res.json();

  const table = document.getElementById("studentTable");
  table.innerHTML = "";

  students.forEach(student => {
    table.innerHTML += `
      <tr>
        <td>${student.certificateNo || ""}</td>
        <td>${student.roll}</td>
        <td>${student.regNo || ""}</td>
        <td>${student.name}</td>
        <td>
          <button onclick='fillForm(${JSON.stringify(student)})'>Edit</button>
          <button class="delete" onclick="deleteStudent('${student.roll}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

function fillForm(student) {
  document.getElementById("certificateNo").value = student.certificateNo || "";
  document.getElementById("roll").value = student.roll;
  document.getElementById("regNo").value = student.regNo || "";
  document.getElementById("name").value = student.name;
  document.getElementById("resultDate").value = student.resultDate || "";
  document.getElementById("photo").value = student.photo || "";
  document.getElementById("english").value = student.marks.english;
  document.getElementById("mizo").value = student.marks.mizo;
  document.getElementById("mathematics").value = student.marks.mathematics;
  document.getElementById("science").value = student.marks.science;
  document.getElementById("socialScience").value = student.marks.socialScience;
}

function toggleExamType() {

    const exam = document.getElementById("examType").value;

    if (exam === "HSLC") {

        document.getElementById("hslcSubjects").style.display = "block";
        document.getElementById("hsslcSubjects").style.display = "none";

    } else {

        document.getElementById("hslcSubjects").style.display = "none";
        document.getElementById("hsslcSubjects").style.display = "block";

    }
}

</script>

</body>
</html>
