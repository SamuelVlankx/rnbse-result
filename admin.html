<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 9px 12px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      color: white;
      background: #007bff;
    }

    .delete { background: #dc3545; }
    .save { background: #28a745; }

    table {
      width: 100%;
      margin-top: 25px;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    #adminPanel {
      display: none;
    }
  </style>
</head>

<body>

<div id="loginBox" class="card">
  <h2>Admin Login</h2>
  <input id="adminPassword" type="password" placeholder="Enter Admin Password">
  <br>
  <button onclick="login()">Login</button>
  <p id="loginMessage"></p>
</div>

<div id="adminPanel">
  <div class="card">
    <h2>Admin Panel</h2>

    <input id="certificateNo" placeholder="Certificate Number (e.g. MBSE2026-0001)">
    <input id="roll" placeholder="Roll Number">
    <input id="regNo" placeholder="Registration Number">
    <input id="name" placeholder="Student Name">
    <input id="photo" placeholder="Photo URL">
    <input id="english" placeholder="English">
    <input id="mizo" placeholder="Mizo">
    <input id="mathematics" placeholder="Mathematics">
    <input id="science" placeholder="Science">
    <input id="socialScience" placeholder="Social Science">

    <br>
    <button class="save" onclick="addStudent()">Add Student</button>
    <button onclick="updateStudent()">Update Student</button>

    <p id="message"></p>
  </div>

  <table>
    <thead>
      <tr>
        <th>Certificate No</th>
        <th>Roll</th>
        <th>Reg No</th>
        <th>Name</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<script>
const ADMIN_PASSWORD = "admin123";

function login() {
  const password = document.getElementById("adminPassword").value;

  if (password === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadStudents();
  } else {
    document.getElementById("loginMessage").innerText = "Wrong password";
  }
}

function getFormData() {
  return {
    certificateNo: document.getElementById("certificateNo").value,
    roll: document.getElementById("roll").value,
    regNo: document.getElementById("regNo").value,
    name: document.getElementById("name").value,
    photo: document.getElementById("photo").value,
    marks: {
      english: Number(document.getElementById("english").value),
      mizo: Number(document.getElementById("mizo").value),
      mathematics: Number(document.getElementById("mathematics").value),
      science: Number(document.getElementById("science").value),
      socialScience: Number(document.getElementById("socialScience").value)
    }
  };
}

async function addStudent() {
  const res = await fetch("/add-student", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(getFormData())
  });

  const data = await res.json();
  document.getElementById("message").innerText = data.message;
  loadStudents();
}

async function updateStudent() {
  const student = getFormData();

  const res = await fetch("/update-student/" + student.roll, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(student)
  });

  const data = await res.json();
  document.getElementById("message").innerText = data.message;
  loadStudents();
}

async function deleteStudent(roll) {
  if (!confirm("Delete roll number " + roll + "?")) return;

  const res = await fetch("/delete-student/" + roll, {
    method: "DELETE"
  });

  const data = await res.json();
  document.getElementById("message").innerText = data.message;
  loadStudents();
}

async function loadStudents() {
  const res = await fetch("/students");
  const students = await res.json();

  const table = document.getElementById("studentTable");
  table.innerHTML = "";

  students.forEach(student => {
    table.innerHTML += `
      <tr>
        <td>${student.certificateNo || ""}</td>
        <td>${student.roll}</td>
        <td>${student.regNo || ""}</td>
        <td>${student.name}</td>
        <td>
          <button onclick='fillForm(${JSON.stringify(student)})'>Edit</button>
          <button class="delete" onclick="deleteStudent('${student.roll}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

function fillForm(student) {
  document.getElementById("certificateNo").value = student.certificateNo || "";
  document.getElementById("roll").value = student.roll;
  document.getElementById("regNo").value = student.regNo || "";
  document.getElementById("name").value = student.name;
  document.getElementById("photo").value = student.photo || "";
  document.getElementById("english").value = student.marks.english;
  document.getElementById("mizo").value = student.marks.mizo;
  document.getElementById("mathematics").value = student.marks.mathematics;
  document.getElementById("science").value = student.marks.science;
  document.getElementById("socialScience").value = student.marks.socialScience;
}
</script>

</body>
</html>
