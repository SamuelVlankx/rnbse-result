<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Certificate Verification</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Mizoram Board of School Education</h1>
<p>Certificate Verification Portal</p>
</header>

<div class="card">
<div id="result">
<h2>Verifying...</h2>
</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

const roll = params.get("roll");
const regNo = params.get("regNo");

async function verify(){

const res = await fetch(`/result?roll=${roll}&regNo=${regNo}`);
const data = await res.json();

if(data.error){

document.getElementById("result").innerHTML=`
<h2 style="color:red">❌ Certificate Not Found</h2>
`;

return;

}

document.getElementById("result").innerHTML=`

<div style="text-align:center;margin-bottom:20px;">
<h1 style="color:#0b7a2a;">✅ CERTIFICATE VERIFIED</h1>
<p style="font-size:18px;color:#555;">
This certificate has been successfully verified by the
<br>
<b>Mizoram Board of School Education</b>
</p>
</div>

<img src="${data.photo}" width="140" style="border-radius:10px"><br><br>

<hr>

<table style="width:100%;margin-top:15px;">
<tr>
<td><b>Certificate No.</b></td>
<td>${data.certificateNo}</td>
</tr>

<tr>
<td><b>Roll Number</b></td>
<td>${data.roll}</td>
</tr>

<tr>
<td><b>Registration No.</b></td>
<td>${data.regNo}</td>
</tr>

<tr>
<td><b>Percentage</b></td>
<td>${data.percentage}%</td>
</tr>

<tr>
<td><b>Grade</b></td>
<td>${data.grade}</td>
</tr>

<tr>
<td><b>Status</b></td>
<td style="color:green;"><b>VALID CERTIFICATE</b></td>
</tr>
</table>

<h2>${data.name}</h2>

<p><b>Certificate No:</b> ${data.certificateNo}</p>

<p><b>Roll No:</b> ${data.roll}</p>

<p><b>Registration No:</b> ${data.regNo}</p>

<p><b>Percentage:</b> ${data.percentage}%</p>

<p><b>Grade:</b> ${data.grade}</p>

`;

}

verify();

</script>

<footer style="margin-top:30px;text-align:center;">
<hr>
<p>
This verification was generated electronically by the
<br>
<b>Mizoram Board of School Education</b>
</p>

<p style="color:green;font-weight:bold;">
✔ Authentic Digital Verification
</p>
</footer>
  
</body>
</html>
